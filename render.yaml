services:
  - type: web
    name: ai-exam-notes-backend
    runtime: node
    plan: free
    root: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://ai-exam-notes-generator-frontend.onrender.com
      # Add other environment variables below (get from your .env):
      # - key: MONGODB_URI
      #   value: your_mongodb_connection_string
      # - key: GEMINI_API_KEY
      #   value: your_gemini_api_key
      # - key: JWT_SECRET
      #   value: your_jwt_secret
